# 변경: PostgreSQL 추가, DATABASE_URL을 PostgreSQL 연결 문자열로 변경
# 두 서비스가 같은 네트워크에서 통신하도록 설정

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: asset_manager
      POSTGRES_PASSWORD: asset_manager_pass
      POSTGRES_DB: asset_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset-network

  app:
    build:
      context: .
      dockerfile: dockerfile
    image: asset-manager:latest
    container_name: license-app
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://asset_manager:asset_manager_pass@postgres:5432/asset_manager"
      SECURE_COOKIE: "false"
      SEED_ADMIN_USERNAME: "admin"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-changeme123}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - asset-network

networks:
  asset-network:
    driver: bridge

volumes:
  postgres_data:
