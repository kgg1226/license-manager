name: Deploy to AWS EC2

on:
  workflow_dispatch:  # 수동 트리거 (GitHub Actions 탭에서 버튼 클릭)
    inputs:
      confirm:
        description: '배포를 진행하시겠습니까? (yes 입력)'
        required: true
        default: 'no'

env:
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  S3_PATH: ${{ secrets.S3_PATH }}
  APP_NAME: license-manager
  ZIP_NAME: license-manager.zip
  REMOTE_DIR: /home/ssm-user/app
  HAS_SLACK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'

    steps:
      # ─── 1. 소스코드 체크아웃 ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. zip 압축 및 S3 업로드 ────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Zip source & upload to S3
        run: |
          zip -r $ZIP_NAME . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".next/*" \
            --exclude "*.env*"

          aws s3 cp $ZIP_NAME "$S3_PATH/$ZIP_NAME"

          echo "✅ S3 업로드 완료"

      # ─── 3. EC2에서 배포 실행 ────────────────────────────────────────
      - name: Deploy on EC2 via SSM
        id: deploy
        run: |
          PARAMS=$(jq -nc \
            --arg s3 "$S3_PATH/$ZIP_NAME" \
            --arg dir "$REMOTE_DIR" \
            --arg app "$APP_NAME" \
            --arg zip "$ZIP_NAME" \
            '{commands: [
              "set -e",
              ("echo === [1/4] S3에서 소스코드 다운로드 ==="),
              ("cd " + $dir),
              ("aws s3 cp " + $s3 + " ."),
              ("sudo rm -rf " + $app),
              ("sudo mkdir -p " + $app + " && sudo chown -R ssm-user:ssm-user " + $app),
              ("unzip -q " + $zip + " -d " + $app + " && rm " + $zip),
              ("cd " + $app),
              "echo === [2/4] 스왑 확인 ===",
              "free -h",
              "if [ ! -f /swapfile ]; then sudo dd if=/dev/zero of=/swapfile bs=128M count=16 && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile && echo 스왑 설정 완료; fi",
              "echo === [3/4] 기존 컨테이너 정지 + 정리 ===",
              "sudo docker-compose down || true",
              "sudo docker image prune -a -f",
              "sudo docker builder prune -f",
              "echo === [4/4] Docker Compose 빌드 + 시작 ===",
              "sudo docker-compose build",
              "sudo docker-compose up -d",
              "echo 배포 완료"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM 명령 ID: $COMMAND_ID"

      - name: Wait for deployment to complete
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.COMMAND_ID }}"
          echo "배포 완료 대기 중..."

          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "[$i/24] 상태: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 배포 성공"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              echo "❌ 배포 실패: $STATUS"
              exit 1
            fi
          done

          echo "❌ 배포 타임아웃 (6분 초과)"
          exit 1

      # ─── 4. QA 자동화 (EC2 내부 localhost로 실행, 폐쇄망 대응) ────────
      - name: Run QA checks via SSM
        id: qa
        run: |
          QA_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BASE_URL=http://localhost:8080",
              "FAIL=0",
              "echo \"=== QA 시작 ===\"",
              "for i in 1 2 3 4 5 6; do STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" $BASE_URL/login || echo 000); if [ \"$STATUS\" = \"200\" ]; then echo \"앱 준비됨\"; break; fi; echo \"[$i/6] 대기... ($STATUS)\"; sleep 5; done",
              "STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" $BASE_URL/login); if [ \"$STATUS\" = \"200\" ]; then echo \"PASS /login\"; else echo \"FAIL /login $STATUS\"; FAIL=1; fi",
              "STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" -X POST $BASE_URL/api/auth/login -H \"Content-Type: application/json\" -d \"{\\\"username\\\":\\\"admin\\\",\\\"password\\\":\\\"admin123\\\"}\"); if [ \"$STATUS\" = \"200\" ]; then echo \"PASS POST /api/auth/login\"; else echo \"FAIL POST /api/auth/login $STATUS\"; FAIL=1; fi",
              "COOKIE=$(curl -s -i -X POST $BASE_URL/api/auth/login -H \"Content-Type: application/json\" -d \"{\\\"username\\\":\\\"admin\\\",\\\"password\\\":\\\"admin123\\\"}\" | grep -i set-cookie | grep session_token | sed \"s/.*session_token=//;s/;.*//\")",
              "for PAGE in / /licenses /employees /settings/import; do STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" -H \"Cookie: session_token=$COOKIE\" $BASE_URL$PAGE); if [ \"$STATUS\" = \"200\" ]; then echo \"PASS $PAGE\"; else echo \"FAIL $PAGE $STATUS\"; FAIL=1; fi; done",
              "for API in /api/licenses /api/employees; do STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" -H \"Cookie: session_token=$COOKIE\" $BASE_URL$API); if [ \"$STATUS\" = \"200\" ]; then echo \"PASS $API\"; else echo \"FAIL $API $STATUS\"; FAIL=1; fi; done",
              "echo \"=== QA 완료 ===\"",
              "if [ \"$FAIL\" = \"1\" ]; then echo \"QA_RESULT=FAIL\"; exit 1; else echo \"QA_RESULT=PASS\"; fi"
            ]' \
            --timeout-seconds 120 \
            --query 'Command.CommandId' \
            --output text)

          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$QA_COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "[$i/12] QA 상태: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$QA_COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query 'StandardOutputContent' --output text
              echo "✅ QA 전체 통과"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "$QA_COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query 'StandardOutputContent' --output text
              echo "❌ QA 실패"
              exit 1
            fi
          done

          echo "❌ QA 타임아웃"
          exit 1

      # ─── 5. 롤백 (QA 또는 배포 실패 시) ────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ 실패 감지 — 롤백 시도 중..."

          ROLLBACK_PARAMS=$(jq -nc \
            --arg dir "$REMOTE_DIR/$APP_NAME" \
            '{commands: [
              ("cd " + $dir),
              "if sudo docker images | grep -q license-manager.*backup; then sudo docker-compose down || true && sudo docker tag license-manager:backup license-manager:latest && sudo docker-compose up -d && echo 롤백 완료; else echo 백업 이미지 없음 — 롤백 불가; fi"
            ]}')

          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$ROLLBACK_PARAMS" \
            --timeout-seconds 60 || true

      # ─── 6. Slack 알림 ───────────────────────────────────────────────
      - name: Slack 성공 알림
        if: success() && env.HAS_SLACK == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *license-manager 배포 성공*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "배포자", "value": "${{ github.actor }}", "short": true },
                  { "title": "커밋", "value": "${{ github.sha }}", "short": false },
                  { "title": "QA", "value": "전체 통과 ✅", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 실패 알림
        if: failure() && env.HAS_SLACK == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *license-manager 배포 실패 — 롤백됨*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "배포자", "value": "${{ github.actor }}", "short": true },
                  { "title": "커밋", "value": "${{ github.sha }}", "short": false },
                  { "title": "Actions 로그", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
